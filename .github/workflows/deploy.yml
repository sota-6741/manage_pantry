name: Rails CI/CD (GHCR + OCI)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_DATABASE: manage_pantry_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Database
        run: |
          cp config/database.ci.yml config/database.yml
          bundle exec rails db:prepare RAILS_ENV=test

      - name: Run tests
        env:
          RAILS_ENV: test
          MYSQL_DATABASE: manage_pantry_test
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
        run: bundle exec rails test

      - name: Run Security & Lint
        run: |
          bundle exec bundler-audit --update
          bundle exec brakeman --no-pager
          bundle exec rubocop

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          name: manage-pantry.key
          if_key_exists: replace
          known_hosts: "placeholder"

      - name: Check Connectivity & Setup Known Hosts
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          CLEAN_IP=$(echo "${SERVER_IP}" | xargs)
          echo "SERVER_IP_CLEANED=${CLEAN_IP}" >> $GITHUB_ENV
          echo "Connecting to ${CLEAN_IP}..."
          if ! nc -zv -w 10 "${CLEAN_IP}" 22; then
            echo "Error: Connection to ${CLEAN_IP} on port 22 timed out."
            echo "Please check OCI 'Security Lists' or 'Network Security Groups' for source 0.0.0.0/0."
            exit 1
          fi
          mkdir -p ~/.ssh
          ssh-keyscan -H "${CLEAN_IP}" >> ~/.ssh/known_hosts

      - name: Deploy to OCI
        env:
          SERVER_IP: ${{ env.SERVER_IP_CLEANED }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          REPO: ${{ github.repository }}
        run: |
          # 1. ŃéĄŃā╝ŃāÉŃā╝õĖŖŃü½ŃāćŃéŻŃā¼Ńé»ŃāłŃā¬ŃéÆõĮ£µłÉ
          ssh -i ~/.ssh/manage-pantry.key "ubuntu@${SERVER_IP}" "mkdir -p /home/ubuntu/manage-pantry"

          # 2. GitHub Actions Õü┤Ńü¦ .env ŃāĢŃéĪŃéżŃā½ŃéÆńö¤µłÉ
          cat <<EOF > .env
          MYSQL_DATABASE=$MYSQL_DATABASE
          MYSQL_USER=$MYSQL_USER
          MYSQL_PASSWORD=$MYSQL_PASSWORD
          MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
          RAILS_MASTER_KEY=$RAILS_MASTER_KEY
          SECRET_KEY_BASE=$SECRET_KEY_BASE
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
          GOOGLE_REDIRECT_URI=$GOOGLE_REDIRECT_URI
          GITHUB_REPOSITORY=$REPO
          EOF

          # 3. ŃāĢŃéĪŃéżŃā½ŃéÆŃéĄŃā╝ŃāÉŃā╝Ńü½Ķ╗óķĆü
          scp -i ~/.ssh/manage-pantry.key .env docker-compose.prod.yml Caddyfile scripts/deploy.sh "ubuntu@${SERVER_IP}:/home/ubuntu/manage-pantry/"
          
          # 4. ŃéĄŃā╝ŃāÉŃā╝õĖŖŃü¦ŃāćŃāŚŃāŁŃéżŃé╣Ńé»Ńā¬ŃāŚŃāłŃéÆÕ«¤ĶĪī
          ssh -i ~/.ssh/manage-pantry.key "ubuntu@${SERVER_IP}" "
            cd /home/ubuntu/manage-pantry
            export GHCR_TOKEN=${{ secrets.GITHUB_TOKEN }}
            export GHCR_ACTOR=${{ github.actor }}
            bash deploy.sh
          "
