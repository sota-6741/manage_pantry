name: Rails CI/CD (GHCR + OCI)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_DATABASE: manage_pantry_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Database
        run: |
          cp config/database.ci.yml config/database.yml
          bundle exec rails db:prepare RAILS_ENV=test

      - name: Run tests
        env:
          RAILS_ENV: test
          MYSQL_DATABASE: manage_pantry_test
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
        run: bundle exec rails test

      - name: Run Security & Lint
        run: |
          bundle exec bundler-audit --update
          bundle exec brakeman --no-pager
          bundle exec rubocop

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64 # A1.Flexならarm64ですが、今回はE2.1.Microなのでamd64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          name: manage-pantry.key # 独自の鍵名を指定
          known_hosts: ${{ secrets.SERVER_IP }}

      - name: Deploy to OCI
        run: |
          ssh -i ~/.ssh/manage-pantry.key ubuntu@${{ secrets.SERVER_IP }} "
            mkdir -p /home/ubuntu/manage-pantry
            cd /home/ubuntu/manage-pantry
            
            # .env の生成（Secrets から値を安全に書き出し）
            cat <<EOF > .env
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
            GITHUB_REPOSITORY=${{ github.repository }}
            EOF

            chmod 600 .env
          "
          # 設定ファイルとスクリプトを転送
          scp -i ~/.ssh/manage-pantry.key docker-compose.prod.yml scripts/deploy.sh ubuntu@${{ secrets.SERVER_IP }}:/home/ubuntu/manage-pantry/
          
          # デプロイスクリプトの実行
          ssh -i ~/.ssh/manage-pantry.key ubuntu@${{ secrets.SERVER_IP }} "
            cd /home/ubuntu/manage-pantry
            export GHCR_TOKEN=${{ secrets.GITHUB_TOKEN }}
            export GHCR_ACTOR=${{ github.actor }}
            bash deploy.sh
          "
